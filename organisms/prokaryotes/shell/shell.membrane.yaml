# 膜声明 v0.1.0
# shell — 鞭毛 / 效应器
# 生物类比：具有鞭毛的原核细胞（与外部环境的直接交互界面）
# 这是 Being 中最"原始"的 Skill——纯粹的环境交互能力

identity:
  name: "shell"
  origin: "abiogenesis"
  era: 0
  source: "~/.cursor/skills-cursor/shell/"

ingress:
  - name: "command"
    type: "command"
    required: true
    description: "要执行的 shell 命令（用户通过 shell 请求提供的完整文本）"

egress:
  - name: "exit_code"
    type: "number"
    description: "命令退出码"
  - name: "stdout"
    type: "text"
    description: "标准输出内容"
  - name: "stderr"
    type: "text"
    description: "标准错误内容"

side_effects:
  - "在终端中执行任意命令"
  - "可能修改文件系统中的任何内容"
  - "可能安装/卸载软件包"
  - "可能启动/停止进程"
  - "副作用范围不可预测（取决于命令内容）"

signals:
  receives: ["shell-command-request"]
  emits: ["command-complete", "command-failed"]

niche:
  contexts: ["terminal-operation", "system-administration", "devops"]
  triggers:
    - "用户显式调用 shell 请求"

affinity:
  complements: ["babysit", "create-skill", "update-cursor-settings"]
  competes_with: []
  depends_on: []
