skill: "presence-check"
receptors:
  - signal: "readiness-check-request"
    action: "读取运行时真相源并生成 readiness snapshot"
  - signal: "life-created"
    action: "记录新生命创建事件以更新 readiness 判断"
  - signal: "life-creation-failed"
    action: "观察创世失败事件，标记运行中断"
  - signal: "membrane-created"
    action: "观察膜生成事件以确认边界形成"
  - signal: "compatibility-analyzed"
    action: "观察兼容性分析事件，更新共生准备度"
  - signal: "phylogeny-updated"
    action: "观察谱系更新事件以确认身份写入"
  - signal: "metabolism-recorded"
    action: "观察代谢记录事件以确认运行事实沉积"
  - signal: "baseline-recorded"
    action: "观察首次代谢基线，更新系统心跳判断"
  - signal: "stats-generated"
    action: "观察统计生成事件，更新运行历史摘要"
  - signal: "efficiency-alert"
    action: "观察效率告警事件，标记潜在稳态风险"
  - signal: "rule-created"
    action: "观察规则建立事件，更新系统稳态画像"
  - signal: "rule-active"
    action: "观察规则激活事件，更新系统稳态画像"
  - signal: "agent-created"
    action: "观察新 agent 诞生事件，更新系统能力谱"
  - signal: "migration-complete"
    action: "观察迁移完成事件，更新系统形式转化记录"
  - signal: "migration-undone"
    action: "观察迁移撤销事件，更新系统形式转化记录"
  - signal: "command-complete"
    action: "观察命令完成事件，更新环境交互证据"
  - signal: "command-failed"
    action: "观察命令失败事件，记录运行中断证据"
  - signal: "settings-updated"
    action: "观察环境设置变化，更新运行环境画像"
  - signal: "restart-required"
    action: "观察重启要求事件，标记潜在运行中断"
  - signal: "pr-ready-to-merge"
    action: "观察 PR 就绪事件，记录协作状态"
  - signal: "pr-needs-human-review"
    action: "观察人工审查请求，记录协作边界"
  - signal: "ci-fixed"
    action: "观察 CI 修复事件，记录反馈闭环"
  - signal: "readiness-check-complete"
    action: "观察 readiness 检查完成事件，记录存在校验结果"
